services:
  server:
    build:
      context: .
    environment:
      NODE_ENV: development
      POSTGRES_URL: postgres://postgres:postgres@db:5432/auronix
      REDIS_URL: redis://cache:6379

    ports:
      - 3000:3000
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auronix
    volumes:
      - auronix-data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
  cache:
    image: redis:7-alpine
    ports:
      - 6379:6379
    volumes:
      - auronix-cache:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  auronix-data:
  auronix-cache:
